name: Feature Request ✨
description: Suggest a new feature for HyperChat AI
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        ## ✨ Feature Request

        We'd love to hear your ideas for making HyperChat AI better!

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      placeholder: What problem does this feature solve?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      placeholder: Describe your proposed solution...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      placeholder: Any alternative solutions you've considered?

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      placeholder: Any other context about the feature request?