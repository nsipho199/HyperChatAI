name: Bug Report 🐛
description: Report a bug to help us improve HyperChat AI
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        ## 🐛 Bug Report

        Thanks for taking the time to report this bug!

  - type: textarea
    id: description
    attributes:
      label: Description
      placeholder: Describe the bug in detail...
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      placeholder: What should happen...

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      placeholder: What actually happens...

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Android
        - iOS
        - Web
        - All
    validations:
      required: true